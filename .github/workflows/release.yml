name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create source archive
        run: |
          mkdir -p dist
          git archive --format=tar.gz --prefix="mole-ai-${{ steps.version.outputs.version }}/" \
            -o "dist/mole-ai-${{ steps.version.outputs.version }}.tar.gz" HEAD

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > /tmp/release-notes.md << EOF
          ## Mole-AI ${VERSION}

          AI-enhanced macOS system maintenance CLI based on [tw93/Mole](https://github.com/tw93/mole).

          ### Install
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/xronocode/mole-ai/main/install.sh | bash
          \`\`\`

          ### What's included
          - All upstream Mole features (clean, uninstall, optimize, analyze, status, purge)
          - **AI Advisor**: \`mo advisor\` — LLM-powered system analysis with interactive cleanup
          - Works with Ollama, OpenRouter, vLLM, LM Studio, or any OpenAI-compatible endpoint
          \`\`\`bash
          mo advisor --setup     # Configure endpoint
          mo advisor             # Run analysis
          mo advisor --dry-run   # Preview collected data
          \`\`\`
          EOF
          echo "file=/tmp/release-notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.file }}
          files: |
            dist/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get checksums
        id: checksums
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          curl -fsSL -o /tmp/SHA256SUMS "https://github.com/xronocode/mole-ai/releases/download/${TAG}/SHA256SUMS"
          SOURCE_SHA=$(awk '$2 == "mole-ai-${{ steps.version.outputs.version }}.tar.gz" { print $1 }' /tmp/SHA256SUMS)
          echo "source_sha=${SOURCE_SHA}" >> $GITHUB_OUTPUT

      - name: Update tap formula
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          SOURCE_SHA="${{ steps.checksums.outputs.source_sha }}"

          git clone "https://x-access-token:${PAT_TOKEN}@github.com/xronocode/homebrew-mole-ai.git" /tmp/tap

          cat > /tmp/tap/Formula/mole-ai.rb << 'FORMULA'
          class MoleAi < Formula
            desc "AI-enhanced macOS system maintenance CLI"
            homepage "https://github.com/xronocode/mole-ai"
            url "https://github.com/xronocode/mole-ai/archive/refs/tags/${TAG}.tar.gz"
            sha256 "${SOURCE_SHA}"
            license "MIT"

            depends_on "bash"

            def install
              libexec.install Dir["*"]
              bin.install_symlink libexec/"mole" => "mole-ai"
              bin.install_symlink libexec/"mole" => "mo"
            end

            def caveats
              <<~EOS
                Run `mo advisor --setup` to configure the AI endpoint.
                Works with Ollama, OpenRouter, vLLM, LM Studio, etc.
              EOS
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/mo --version")
            end
          end
          FORMULA

          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mole-ai.rb
          git diff --cached --quiet && exit 0
          git commit -m "mole-ai ${VERSION}"
          git push origin HEAD:main
